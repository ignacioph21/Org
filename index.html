<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Journal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="/Lab-Journal-html/_pagefind/pagefind-ui.css" rel="stylesheet" />
  <script src="/Lab-Journal-html/_pagefind/pagefind-ui.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #282c34; color: #bbc2cf; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 500; color: #51afef; margin-bottom: 0.25rem; letter-spacing: 0.02em; }
    .subtitle { font-size: 0.8rem; color: #5b6268; margin-bottom: 2rem; }

    /* tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #3f444a; }
    .tab { padding: 8px 16px; font-size: 0.85rem; cursor: pointer; color: #5b6268; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; background: none; border-top: none; border-left: none; border-right: none; }
    .tab.active { color: #51afef; border-bottom-color: #51afef; }
    .tab:hover { color: #bbc2cf; }

    /* panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* index tree */
    .year-block { margin-bottom: 1.5rem; }
    details { background: #21242b; border: 1px solid #3f444a; border-radius: 6px; overflow: hidden; margin-bottom: 0.5rem; }
    summary { padding: 10px 14px; cursor: pointer; font-size: 0.85rem; color: #c678dd; font-weight: 500; list-style: none; display: flex; align-items: center; gap: 8px; user-select: none; }
    summary::-webkit-details-marker { display: none; }
    summary .arrow { color: #5b6268; font-size: 12px; transition: transform 0.15s; }
    details[open] summary .arrow { transform: rotate(90deg); }
    summary .label { flex: 1; }
    summary .count { font-size: 0.75rem; color: #5b6268; }
    .month-block { padding: 0 0 8px 0; }
    .entry-link { display: flex; align-items: center; padding: 6px 14px 6px 28px; color: #bbc2cf; text-decoration: none; font-size: 0.85rem; gap: 8px; transition: background 0.1s; }
    .entry-link:hover { background: #2c313a; color: #eceff4; }
    .entry-link i { color: #5b6268; font-size: 14px; flex-shrink: 0; }
    .no-results { text-align: center; color: #5b6268; font-size: 0.85rem; padding: 2rem; }

    /* pagefind overrides */
    .pagefind-ui { --pagefind-ui-scale: 0.85; --pagefind-ui-primary: #51afef; --pagefind-ui-text: #bbc2cf; --pagefind-ui-background: #21242b; --pagefind-ui-border: #3f444a; --pagefind-ui-tag: #3f444a; --pagefind-ui-border-width: 1px; --pagefind-ui-border-radius: 6px; --pagefind-ui-image-border-radius: 4px; --pagefind-ui-font: 'JetBrains Mono', 'Fira Code', monospace; }
    .pagefind-ui__search-input { background: #21242b !important; color: #bbc2cf !important; border-color: #3f444a !important; font-family: inherit !important; }
    .pagefind-ui__search-input:focus { border-color: #51afef !important; outline: none !important; }
    .pagefind-ui__result { border-color: #3f444a !important; background: #21242b !important; border-radius: 6px !important; margin-bottom: 0.75rem !important; }
    .pagefind-ui__result-title a { color: #51afef !important; }
    .pagefind-ui__result-excerpt { color: #8a95a3 !important; }
    .pagefind-ui__button { background: #21242b !important; color: #bbc2cf !important; border-color: #3f444a !important; font-family: inherit !important; }
    .pagefind-ui__button:hover { border-color: #51afef !important; color: #51afef !important; }
    .pagefind-ui__search-clear { color: #5b6268 !important; }
    .pagefind-ui__message { color: #5b6268 !important; font-size: 0.8rem !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lab Journal</h1>
    <div class="subtitle">Indice de entradas</div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('index')">
        <i class="ti ti-layout-list" aria-hidden="true"></i> Indice
      </button>
      <button class="tab" onclick="showTab('search')">
        <i class="ti ti-search" aria-hidden="true"></i> Buscar
      </button>
    </div>

    <div id="panel-index" class="panel active">
      <div id="tree"></div>
    </div>

    <div id="panel-search" class="panel">
      <div id="pagefind-search"></div>
    </div>
  </div>

  <script>
    var MONTH_NAMES = {
      '01':'Enero','02':'Febrero','03':'Marzo','04':'Abril',
      '05':'Mayo','06':'Junio','07':'Julio','08':'Agosto',
      '09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'
    };

    var searchInitialized = false;

    function showTab(name) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      document.querySelector('.tab[onclick="showTab(\'' + name + '\')"]').classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');

      if (name === 'search' && !searchInitialized) {
        new PagefindUI({ element: '#pagefind-search', bundlePath: '/Lab-Journal-html/_pagefind/', showImages: false, translations: { placeholder: 'Buscar en el journal...' } });
        searchInitialized = true;
      }
    }

    function loadIndex() {
      return fetch('search-index.json').then(function(res) { return res.json(); });
    }

    function buildTree(entries) {
      var tree = {};
      entries.forEach(function(e) {
        if (!tree[e.year]) tree[e.year] = {};
        if (!tree[e.year][e.month]) tree[e.year][e.month] = [];
        tree[e.year][e.month].push(e);
      });

      var container = document.getElementById('tree');
      container.innerHTML = '';

      if (entries.length === 0) {
        container.innerHTML = '<div class="no-results">No hay entradas.</div>';
        return;
      }

      var years = Object.keys(tree).sort(function(a,b) { return b - a; });
      years.forEach(function(year) {
        var yearBlock = document.createElement('div');
        yearBlock.className = 'year-block';

        var months = Object.keys(tree[year]).sort(function(a,b) { return b - a; });
        var totalEntries = months.reduce(function(s, m) { return s + tree[year][m].length; }, 0);

        var yearDetails = document.createElement('details');
        yearDetails.open = true;
        yearDetails.innerHTML = '<summary>'
          + '<span class="arrow">&#9654;</span>'
          + '<span class="label">' + year + '</span>'
          + '<span class="count">' + totalEntries + ' entr.</span>'
          + '</summary>';

        months.forEach(function(month) {
          var monthBlock = document.createElement('div');
          monthBlock.className = 'month-block';

          var monthDetails = document.createElement('details');
          monthDetails.open = true;
          var monthEntries = tree[year][month];
          monthDetails.innerHTML = '<summary>'
            + '<span class="arrow">&#9654;</span>'
            + '<span class="label">' + (MONTH_NAMES[month] || month) + '</span>'
            + '<span class="count">' + monthEntries.length + ' entr.</span>'
            + '</summary>';

          monthEntries.forEach(function(e) {
            var a = document.createElement('a');
            a.className = 'entry-link';
            a.href = e.url;
            a.innerHTML = '<i class="ti ti-file-text" aria-hidden="true"></i>' + e.title;
            monthDetails.appendChild(a);
          });

          monthBlock.appendChild(monthDetails);
          yearDetails.appendChild(monthBlock);
        });

        yearBlock.appendChild(yearDetails);
        container.appendChild(yearBlock);
      });
    }

    loadIndex().then(function(data) {
      buildTree(data);
    }).catch(function() {
      document.getElementById('tree').innerHTML = '<div class="no-results">No se pudo cargar el indice.</div>';
    });
  </script>
</body>
</html>
