<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Journal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #282c34; color: #bbc2cf; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 500; color: #51afef; margin-bottom: 0.25rem; letter-spacing: 0.02em; }
    .subtitle { font-size: 0.8rem; color: #5b6268; margin-bottom: 2rem; }
    .search-wrap { position: relative; margin-bottom: 2rem; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #5b6268; font-size: 16px; }
    #search { width: 100%; background: #21242b; border: 1px solid #3f444a; border-radius: 6px; padding: 8px 12px 8px 36px; color: #bbc2cf; font-family: inherit; font-size: 0.85rem; outline: none; }
    #search:focus { border-color: #51afef; }
    #search::placeholder { color: #5b6268; }
    .year-block { margin-bottom: 1.5rem; }
    details { background: #21242b; border: 1px solid #3f444a; border-radius: 6px; overflow: hidden; margin-bottom: 0.5rem; }
    summary { padding: 10px 14px; cursor: pointer; font-size: 0.85rem; color: #c678dd; font-weight: 500; list-style: none; display: flex; align-items: center; gap: 8px; user-select: none; }
    summary::-webkit-details-marker { display: none; }
    summary .arrow { color: #5b6268; font-size: 12px; transition: transform 0.15s; }
    details[open] summary .arrow { transform: rotate(90deg); }
    summary .label { flex: 1; }
    summary .count { font-size: 0.75rem; color: #5b6268; }
    .month-block { padding: 0 0 8px 0; }
    .entry-link { display: flex; align-items: center; padding: 6px 14px 6px 28px; color: #bbc2cf; text-decoration: none; font-size: 0.85rem; gap: 8px; transition: background 0.1s; }
    .entry-link:hover { background: #2c313a; color: #eceff4; }
    .entry-link i { color: #5b6268; font-size: 14px; flex-shrink: 0; }
    .no-results { text-align: center; color: #5b6268; font-size: 0.85rem; padding: 2rem; }
    .highlight { color: #ecbe7b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lab Journal</h1>
    <div class="subtitle">Indice de entradas</div>
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input id="search" type="text" placeholder="Buscar entrada..." autocomplete="off" />
    </div>
    <div id="tree"></div>
  </div>

  <script>
    var MONTH_NAMES = {
      '01':'Enero','02':'Febrero','03':'Marzo','04':'Abril',
      '05':'Mayo','06':'Junio','07':'Julio','08':'Agosto',
      '09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'
    };

    function loadIndex() {
      return fetch('search-index.json').then(function(res) { return res.json(); });
    }

    function buildTree(entries, query) {
      var q = query.toLowerCase().trim();
      var filtered = q ? entries.filter(function(e) { return e.title.toLowerCase().includes(q); }) : entries;

      var tree = {};
      filtered.forEach(function(e) {
        if (!tree[e.year]) tree[e.year] = {};
        if (!tree[e.year][e.month]) tree[e.year][e.month] = [];
        tree[e.year][e.month].push(e);
      });

      var container = document.getElementById('tree');
      container.innerHTML = '';

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">No se encontraron entradas.</div>';
        return;
      }

      var years = Object.keys(tree).sort(function(a,b) { return b - a; });
      years.forEach(function(year) {
        var yearBlock = document.createElement('div');
        yearBlock.className = 'year-block';

        var months = Object.keys(tree[year]).sort(function(a,b) { return b - a; });
        var totalEntries = months.reduce(function(s, m) { return s + tree[year][m].length; }, 0);

        var yearDetails = document.createElement('details');
        yearDetails.open = true;
        yearDetails.innerHTML = '<summary>'
          + '<span class="arrow">&#9654;</span>'
          + '<span class="label">' + year + '</span>'
          + '<span class="count">' + totalEntries + ' entr.</span>'
          + '</summary>';

        months.forEach(function(month) {
          var monthBlock = document.createElement('div');
          monthBlock.className = 'month-block';

          var monthDetails = document.createElement('details');
          monthDetails.open = true;
          var monthEntries = tree[year][month];
          monthDetails.innerHTML = '<summary>'
            + '<span class="arrow">&#9654;</span>'
            + '<span class="label">' + (MONTH_NAMES[month] || month) + '</span>'
            + '<span class="count">' + monthEntries.length + ' entr.</span>'
            + '</summary>';

          monthEntries.forEach(function(e) {
            var a = document.createElement('a');
            a.className = 'entry-link';
            a.href = e.url;
            var titleHtml = q
              ? e.title.replace(new RegExp('(' + q + ')', 'gi'), '<span class="highlight">$1</span>')
              : e.title;
            a.innerHTML = '<i class="ti ti-file-text" aria-hidden="true"></i>' + titleHtml;
            monthDetails.appendChild(a);
          });

          monthBlock.appendChild(monthDetails);
          yearDetails.appendChild(monthBlock);
        });

        yearBlock.appendChild(yearDetails);
        container.appendChild(yearBlock);
      });
    }

    var allEntries = [];
    loadIndex().then(function(data) {
      allEntries = data;
      buildTree(allEntries, '');
    }).catch(function() {
      document.getElementById('tree').innerHTML = '<div class="no-results">No se pudo cargar el indice.</div>';
    });

    document.getElementById('search').addEventListener('input', function(e) {
      buildTree(allEntries, e.target.value);
    });
  </script>
</body>
</html>
